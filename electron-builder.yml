appId: com.penpal.ai
productName: PenPal AI
copyright: Copyright © 2026
directories:
  output: out
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/icon.ico
    to: icon.ico
asar: true
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.education
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Education
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
